databases:
  - name: punch-db
    databaseName: punch
    user: punch_user
    plan: free

services:
  - type: web
    name: punch-system
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 60
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: MOBILE_JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: punch-db
          property: connectionString